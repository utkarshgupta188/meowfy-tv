name: Build and Release CricfyTV

on:
  release:
    types: [published]

jobs:
  build:
    name: Build Windows App
    runs-on: windows-latest
    
    # Needs permission to upload assets to the release
    permissions:
      contents: write
    
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        shell: bash
        run: npm install || npm install || npm install

      # This runs `vite build && electron-builder` based on package.json
      - name: Build Web App and Package Electron
        run: npm run electron:build

      # Upload the installers and portable executables to the tag/release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        with:
          files: |
            release/*.exe
